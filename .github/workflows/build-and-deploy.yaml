name: Deploy to Cloud Run

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - run: |
          docker build -t us-central1-docker.pkg.dev/ride-backend-portfolio/hibiki-portfolio-repo/app:${{ github.sha }} .

      - run: |
          docker push us-central1-docker.pkg.dev/ride-backend-portfolio/hibiki-portfolio-repo/app:${{ github.sha }}

      - run: |
          gcloud run deploy my-backend \
            --image us-central1-docker.pkg.dev/ride-backend-portfolio/hibiki-portfolio-repo/app:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated
            --service-account hibicloud-runtime@ride-backend-portfolio.iam.gserviceaccount.com