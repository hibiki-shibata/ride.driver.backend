# Migration congfig
# spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=0
spring.flyway.enabled=false

server.port=8080
server.address=0.0.0.0

# DB config
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=create-drop
hibernate.connection.pool_size=5

# Jwt Token settings
security.jwt.secret-string=thisIsASecretKeyForJwtTokenThatShouldBeLongEnough

# Logging settings
# debug=true
logging.level.org.springframework.web=error
logging.level.root=error
logging.level.org.hibernate=error
spring.main.banner-mode=CONSOLE

# Jwt Token settings- Access token validity is 1 hour and refresh token validity is 7 days
security.jwt.access-token-validity-ms=3600000
security.jwt.refresh-token-validity-ms=604800000
security.jwt.issuer=ride-driver-backend