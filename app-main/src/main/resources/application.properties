spring.application.name=ride-driver-backend
server.port=3000

server.tomcat.max-threads=100 # Its the same as netty's workerGroup and callGroup
server.tomcat.min-spare-threads=10
server.tomcat.connection-timeout=20000
# server.tomcat.accept-count=2 # its like netty's connectionGroup
# server.tomcat.max-connections=10000 #its the same as netty's maxConnections

# Environment set (Affect to DB initializer)
spring.profiles.active=dev
# debug=true

logging.level.root=info
# logging.level.org.springframework.web=warn
logging.level.org.hibernate=warn
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# Migration settings
# spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=0
spring.flyway.enabled=false

# Database settings
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=create-drop