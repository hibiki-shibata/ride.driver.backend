# Migration congfig
# spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.baseline-version=0
spring.flyway.enabled=false

server.port=8080
server.address=0.0.0.0

# DB config
spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=jdbc:postgresql://ride-driver-prod-db?cloudSqlInstance=ride-backend-portfolio:us-central1:ride-postgres-instance
spring.datasource.username=ride-driver-prod-db-username
spring.datasource.password=ride-driver-prod-db-password
# Should disable hibernate in prod
# spring.jpa.hibernate.ddl-auto=validate
spring.jpa.hibernate.ddl-auto=create-drop
hibernate.connection.pool_size=5


# Jwt Token settings
security.jwt.secret-string=thisIsASecretKeyForJwtTokenThatShouldBeLongEnough

# Logging settings
logging.level.org.springframework.web=error
logging.level.root=error
logging.level.org.hibernate=error
spring.main.banner-mode=off

# Jwt Token settings- Access token validity is 15 mins and refresh token validity is 7 days
security.jwt.access-token-validity-ms=900000
security.jwt.refresh-token-validity-ms=604800000
security.jwt.issuer=ride-driver-backend

